<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Check-In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="page-container">
            <h1>Welcome to the Mental Health Check-In System</h1> <!-- Added as a test to make sure the page is viewable on a browser -->    
        <h2>Select a Check-In</h2>
        <ul>
            {% for test in tests %}
                <li>
                    <a href="{{url_for('test_page', test_id=test)}}">{{ test.capitalize() }} Check-In</a>
                </li>
            {% endfor %}
        </ul>

    </div>
</body>
</html>
