<!DOCTYPE html>
<html>
<head>
    <title>SynapseNet Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f4e79, #4f8bc9);
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 35px;
            border-radius: 12px;
            width: 340px;

            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1f4e79;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;

            border: 1px solid #ccc;
            border-radius: 6px;

            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #1f4e79;
            box-shadow: 0 0 5px rgba(31, 78, 121, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;

            background: #1f4e79;
            color: white;

            border: none;
            border-radius: 6px;

            font-size: 15px;
            font-weight: bold;
            cursor: pointer;

            transition: 0.2s ease;
        }

        button:hover {
            background: #163a5a;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .demo {
            margin-top: 15px;
            padding: 10px;

            background: #f4f7fb;
            border-radius: 6px;

            font-size: 13px;
            text-align: center;
            color: #444;
        }

        .logo {
            text-align: center;
            font-weight: bold;
            color: #1f4e79;
            margin-bottom: 10px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <div class="logo">SynapseNet</div>

        <h2>Login</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">

            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Log In</button>

        </form>

        <div class="demo">
            Demo login:<br>
            <strong>admin</strong> / <strong>synapse123</strong>
        </div>

    </div>

</body>
</html>
